<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Möbius Light — Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  /* CANVAS */
  #canvas {
    position: fixed;
    inset: 0; width: 100%; height: 100%;
    display: block;
  }

  /* NAV */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    pointer-events: none;
  }
  .h-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.12em;
    color: #fff;
    opacity: 0.9;
  }
  .h-back {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #666;
    text-decoration: none;
    pointer-events: all;
  }

  /* KNOB PANEL */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    background: linear-gradient(to top, rgba(0,0,0,0.98) 80%, transparent);
  }

  .knobs-row {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 12px 16px 28px;
  }

  .knob-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .knob-canvas {
    display: block;
    touch-action: none;
    cursor: grab;
  }
  .knob-canvas:active { cursor: grabbing; }

  /* Roman numeral label */
  .knob-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }

  /* SHARE */
  #share-btn {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 130px);
    right: 20px;
    z-index: 10;
    background: transparent;
    border: 1px solid #1a1a1a;
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #share-btn:active { border-color: #444; }
  #share-btn svg { width: 15px; height: 15px; stroke: #555; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* TOAST */
  #toast {
    position: fixed;
    top: 72px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #bbb;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* TAP BURST */
  .burst {
    position: fixed;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    z-index: 20;
    animation: burst-out 0.6s ease-out forwards;
  }
  @keyframes burst-out {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<header>
  <span class="h-title">MÖBIUS LIGHT</span>
  <a class="h-back" href="index.html">← Back</a>
</header>

<div id="panel">
  <div class="knobs-row">
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-0" width="80" height="80"></canvas>
      <span class="knob-label">I</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-1" width="80" height="80"></canvas>
      <span class="knob-label">II</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-2" width="80" height="80"></canvas>
      <span class="knob-label">III</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-3" width="80" height="80"></canvas>
      <span class="knob-label">IV</span>
    </div>
  </div>
</div>

<button id="share-btn" aria-label="Share">
  <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
</button>

<div id="toast">Link copied</div>

<script>
/* ═══════════════════════
   STATE
═══════════════════════ */
const state = {
  hue:    0,       // I   0–360
  speed:  0.5,     // II  0–1
  style:  0,       // III 0–1 → maps to 4 modes
  trail:  0.5,     // IV  0–1
  tiltX:  0,
  tiltY:  0,
  bursts: [],
  t:      0,
};

const STYLES = ['chase', 'pulse', 'breathe', 'scatter'];

/* ═══════════════════════
   RING CANVAS
═══════════════════════ */
const ringCanvas = document.getElementById('canvas');
const rctx = ringCanvas.getContext('2d');
const N = 50;
let W, H, cx, cy, R;

function resize() {
  W = ringCanvas.width  = window.innerWidth;
  H = ringCanvas.height = window.innerHeight;
  const panelH = document.getElementById('panel').offsetHeight;
  cx = W / 2;
  cy = (H - panelH) / 2;
  R  = Math.min(W, H - panelH) * 0.42;
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

function styleMod(i, t, styleVal) {
  const s = STYLES[Math.floor(styleVal * 3.99)];
  switch (s) {
    case 'chase':   return Math.sin((i / N) * Math.PI * 2 - t * 3) * 0.5 + 0.5;
    case 'pulse':   return (Math.sin(t * 2) * 0.5 + 0.5) * 0.4 + (Math.sin((i / N) * Math.PI * 4 + t) * 0.5 + 0.5) * 0.6;
    case 'breathe': return Math.sin(t * 0.8 + (i / N) * Math.PI) * 0.4 + 0.6;
    case 'scatter': return Math.sin(i * 127.1 + t * 1.5) * 0.5 + 0.5;
    default:        return 1;
  }
}

function drawRing() {
  rctx.clearRect(0, 0, W, H);

  const speedF = 0.2 + state.speed * 1.6;
  const trailF = 0.4 + state.trail * 1.2;
  const ox = state.tiltX * 28;
  const oy = state.tiltY * 12;

  const bars = [];
  for (let i = 0; i < N; i++) {
    const a     = (i / N) * Math.PI * 2;
    const twist = (i / N) * Math.PI;
    bars.push({
      i, a, twist,
      px: cx + ox + R * Math.cos(a),
      py: cy + oy + R * Math.sin(a) * 0.45,
      depth: Math.sin(a),
    });
  }
  bars.sort((a, b) => a.depth - b.depth);

  for (const { i, a, twist, px, py, depth } of bars) {
    const alpha = 0.25 + 0.75 * ((depth + 1) / 2);
    const mod   = styleMod(i, state.t, state.style);
    const bW    = 2.5 + trailF * 1.5;
    const bH    = (24 + 12 * Math.abs(Math.cos(twist))) * (0.4 + mod * 0.6);
    const hue   = (state.hue + i / N * 360 + state.t * 30 * speedF) % 360;
    const lum   = 44 + 26 * mod;

    rctx.save();
    rctx.globalAlpha = alpha * (0.35 + mod * 0.65);
    rctx.translate(px, py);
    rctx.rotate(a + twist);

    const g = rctx.createLinearGradient(0, -bH/2, 0, bH/2);
    g.addColorStop(0,   `hsla(${hue},90%,${lum+10}%,0)`);
    g.addColorStop(0.3, `hsla(${hue},90%,${lum}%,1)`);
    g.addColorStop(0.7, `hsla(${hue},90%,${lum}%,1)`);
    g.addColorStop(1,   `hsla(${hue},90%,${lum+10}%,0)`);
    rctx.fillStyle = g;
    rctx.fillRect(-bW/2, -bH/2, bW, bH);

    rctx.globalAlpha = alpha * mod * 0.1 * trailF;
    rctx.fillStyle = `hsl(${hue},90%,${lum}%)`;
    rctx.fillRect(-bW*4, -bH/2, bW*8, bH);
    rctx.restore();
  }

  // Tap bursts
  state.bursts = state.bursts.filter(b => b.life > 0);
  for (const b of state.bursts) {
    rctx.save();
    rctx.globalAlpha = b.life * 0.5;
    rctx.strokeStyle = `hsl(${b.hue},80%,60%)`;
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.arc(b.x, b.y, (1 - b.life) * 90, 0, Math.PI * 2);
    rctx.stroke();
    rctx.restore();
    b.life -= 0.035;
  }

  state.t += 0.007 * speedF;
  requestAnimationFrame(drawRing);
}
drawRing();

/* ═══════════════════════
   POTENTIOMETER KNOBS
═══════════════════════ */
const KNOB_CONFIGS = [
  { key: 'hue',   min: 0,   max: 360, init: 0,   continuous: true  },
  { key: 'speed', min: 0,   max: 1,   init: 0.5, continuous: false },
  { key: 'style', min: 0,   max: 1,   init: 0,   continuous: false },
  { key: 'trail', min: 0,   max: 1,   init: 0.5, continuous: false },
];

// Knob draw: angle range 210° start to 330° (300° sweep)
const K_START = (210 * Math.PI) / 180;
const K_END   = (330 * Math.PI) / 180; // wraps past 0
const K_SWEEP = (300 * Math.PI) / 180;

function normToAngle(n) {
  // n = 0..1 → angle from K_START sweeping 300°
  return K_START + n * K_SWEEP;
}

function drawKnob(kCanvas, normVal, isActive, hue) {
  const kctx = kCanvas.getContext('2d');
  const size = kCanvas.width;
  const cx   = size / 2;
  const cy   = size / 2;
  const r    = size * 0.36;
  const r2   = size * 0.28;

  kctx.clearRect(0, 0, size, size);

  // Track arc (bg)
  kctx.beginPath();
  kctx.arc(cx, cy, r, K_START, K_START + K_SWEEP);
  kctx.strokeStyle = '#1a1a1a';
  kctx.lineWidth = 2.5;
  kctx.lineCap = 'round';
  kctx.stroke();

  // Track arc (fill)
  const fillEnd = normToAngle(normVal);
  if (normVal > 0) {
    kctx.beginPath();
    kctx.arc(cx, cy, r, K_START, fillEnd);
    kctx.strokeStyle = isActive
      ? `hsl(${hue}, 85%, 60%)`
      : '#555';
    kctx.lineWidth = 2.5;
    kctx.lineCap = 'round';
    kctx.stroke();
  }

  // Body circle
  kctx.beginPath();
  kctx.arc(cx, cy, r2, 0, Math.PI * 2);
  kctx.fillStyle = '#111';
  kctx.fill();
  kctx.strokeStyle = isActive ? `hsl(${hue}, 60%, 25%)` : '#222';
  kctx.lineWidth = 1;
  kctx.stroke();

  // Indicator dot
  const angle = normToAngle(normVal);
  const dx = cx + r2 * 0.65 * Math.cos(angle);
  const dy = cy + r2 * 0.65 * Math.sin(angle);
  kctx.beginPath();
  kctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
  kctx.fillStyle = isActive ? `hsl(${hue}, 90%, 65%)` : '#666';
  kctx.fill();
}

// Init + interaction
const knobEls = [0,1,2,3].map(i => document.getElementById(`knob-${i}`));
const knobState = KNOB_CONFIGS.map(c => ({
  norm: (c.init - c.min) / (c.max - c.min),
  active: false,
  lastY: 0,
}));

function getHue() {
  return (state.hue + state.t * 30) % 360;
}

function redrawAllKnobs() {
  const hue = getHue();
  knobEls.forEach((el, i) => {
    drawKnob(el, knobState[i].norm, knobState[i].active, hue);
  });
}

// Continuously redraw knobs so colour tracks the ring
setInterval(redrawAllKnobs, 50);
redrawAllKnobs();

function applyKnob(i) {
  const cfg = KNOB_CONFIGS[i];
  const val = cfg.min + knobState[i].norm * (cfg.max - cfg.min);
  state[cfg.key] = val;
}

function onKnobTouchStart(e, i) {
  e.preventDefault();
  knobState[i].active = true;
  knobState[i].lastY = e.touches[0].clientY;
  redrawAllKnobs();
}

function onKnobTouchMove(e, i) {
  e.preventDefault();
  const dy   = knobState[i].lastY - e.touches[0].clientY; // up = positive
  knobState[i].lastY = e.touches[0].clientY;
  const delta = dy / 120; // full sweep = 120px drag
  knobState[i].norm = Math.max(0, Math.min(1, knobState[i].norm + delta));
  applyKnob(i);
  redrawAllKnobs();
}

function onKnobTouchEnd(e, i) {
  knobState[i].active = false;
  redrawAllKnobs();
}

knobEls.forEach((el, i) => {
  el.addEventListener('touchstart',  e => onKnobTouchStart(e, i), { passive: false });
  el.addEventListener('touchmove',   e => onKnobTouchMove(e, i),  { passive: false });
  el.addEventListener('touchend',    e => onKnobTouchEnd(e, i),   { passive: false });
  el.addEventListener('touchcancel', e => onKnobTouchEnd(e, i),   { passive: false });
  // Mouse fallback for desktop testing
  let dragging = false;
  el.addEventListener('mousedown',  e => { dragging = true; knobState[i].lastY = e.clientY; knobState[i].active = true; redrawAllKnobs(); });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dy = knobState[i].lastY - e.clientY;
    knobState[i].lastY = e.clientY;
    knobState[i].norm = Math.max(0, Math.min(1, knobState[i].norm + dy / 120));
    applyKnob(i);
    redrawAllKnobs();
  });
  window.addEventListener('mouseup', () => { if(dragging){ dragging = false; knobState[i].active = false; redrawAllKnobs(); } });
});

/* ═══════════════════════
   GYROSCOPE
═══════════════════════ */
let gyroReq = false;
function startGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') window.addEventListener('deviceorientation', onOrientation); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }
}
function onOrientation(e) {
  state.tiltX = (e.gamma || 0) / 90;
  state.tiltY = Math.max(-1, Math.min(1, ((e.beta || 0) - 45) / 45));
}
document.addEventListener('touchstart', () => { if (!gyroReq) { gyroReq = true; startGyro(); } }, { passive: true });

/* ═══════════════════════
   TAP CANVAS
═══════════════════════ */
ringCanvas.addEventListener('touchstart', e => {
  // Don't fire if touch is in panel
  const panelTop = document.getElementById('panel').getBoundingClientRect().top;
  for (const t of e.changedTouches) {
    if (t.clientY >= panelTop) return;
    const hue = getHue();
    state.bursts.push({ x: t.clientX, y: t.clientY, hue, life: 1 });
    const el = document.createElement('div');
    el.className = 'burst';
    el.style.cssText = `left:${t.clientX}px;top:${t.clientY}px;border-color:hsl(${hue},80%,55%)`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}, { passive: true });

/* ═══════════════════════
   SHARE
═══════════════════════ */
document.getElementById('share-btn').addEventListener('click', () => {
  const p = new URLSearchParams({
    h: Math.round(state.hue),
    s: state.speed.toFixed(2),
    m: state.style.toFixed(2),
    t: state.trail.toFixed(2),
  });
  const url = `${location.origin}${location.pathname}?${p}`;
  if (navigator.share) {
    navigator.share({ title: 'Möbius Light', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
});

/* Load shared params from URL */
(function() {
  const p = new URLSearchParams(location.search);
  if (p.has('h')) { const v=(+p.get('h')-0)/360; knobState[0].norm=Math.max(0,Math.min(1,v)); applyKnob(0); }
  if (p.has('s')) { knobState[1].norm=+p.get('s'); applyKnob(1); }
  if (p.has('m')) { knobState[2].norm=+p.get('m'); applyKnob(2); }
  if (p.has('t')) { knobState[3].norm=+p.get('t'); applyKnob(3); }
  redrawAllKnobs();
})();
</script>
</body>
</html>
