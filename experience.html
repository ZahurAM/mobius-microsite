<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Möbius Light — Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  #canvas {
    position: fixed;
    inset: 0; width: 100%; height: 100%;
    display: block;
  }
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    pointer-events: none;
  }
  .h-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.12em;
    color: #fff;
    opacity: 0.9;
  }
  .h-back {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    pointer-events: all;
  }

  /* PANEL */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    background: linear-gradient(to top, rgba(0,0,0,0.98) 80%, transparent);
  }
  .knobs-row {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 12px 16px 28px;
  }
  .knob-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .knob-canvas {
    display: block;
    touch-action: none;
    cursor: grab;
  }
  .knob-canvas:active { cursor: grabbing; }
  .knob-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }

  /* SHARE */
  #share-btn {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 130px);
    right: 20px;
    z-index: 10;
    background: transparent;
    border: 1px solid #1a1a1a;
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #share-btn:active { border-color: #444; }
  #share-btn svg { width: 15px; height: 15px; stroke: #555; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  #toast {
    position: fixed;
    top: 72px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #bbb;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  .burst {
    position: fixed;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    z-index: 20;
    animation: burst-out 0.6s ease-out forwards;
  }
  @keyframes burst-out {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<header>
  <span class="h-title">MÖBIUS LIGHT</span>
  <a class="h-back" href="index.html">← Back</a>
</header>

<div id="panel">
  <div class="knobs-row">
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-0" width="80" height="80"></canvas>
      <span class="knob-label">I</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-1" width="80" height="80"></canvas>
      <span class="knob-label">II</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-2" width="80" height="80"></canvas>
      <span class="knob-label">III</span>
    </div>
    <div class="knob-wrap">
      <canvas class="knob-canvas" id="knob-3" width="80" height="80"></canvas>
      <span class="knob-label">IV</span>
    </div>
  </div>
</div>

<button id="share-btn" aria-label="Share">
  <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
</button>

<div id="toast">Link copied</div>

<script>
/* ═══════════════════════
   STATE
   I   → colour:  0–360  full wash hue
   II  → chase:   0–1    trail length (0=short, 1=long)
   III → speed:   0–1
   IV  → size:    0–1    bar scale
═══════════════════════ */
const state = {
  colour: 0,
  chase:  0.4,
  speed:  0.4,
  size:   0.5,
  tiltX:  0,
  tiltY:  0,
  bursts: [],
  t:      0,
};

/* ═══════════════════════
   RING CANVAS
═══════════════════════ */
const ringCanvas = document.getElementById('canvas');
const rctx = ringCanvas.getContext('2d');
const N = 50;
let W, H, cx, cy, R;

function resize() {
  W = ringCanvas.width  = window.innerWidth;
  H = ringCanvas.height = window.innerHeight;
  const panelH = document.getElementById('panel').offsetHeight;
  cx = W / 2;
  cy = (H - panelH) / 2;
  R  = Math.min(W, H - panelH) * 0.42;
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

function drawRing() {
  rctx.clearRect(0, 0, W, H);

  const speedF  = 0.3 + state.speed * 5.0;
  const sizeF   = 0.4  + state.size  * 1.4;
  const trailF  = 0.04 + state.chase * 0.96; // fraction of ring lit in chase

  const ox = state.tiltX * 28;
  const oy = state.tiltY * 12;

  // Chase head position: 0..1 around the ring
  const chaseHead = (state.t * speedF * 0.15) % 1;

  const bars = [];
  for (let i = 0; i < N; i++) {
    const a     = (i / N) * Math.PI * 2;
    const twist = (i / N) * Math.PI;
    bars.push({
      i, a, twist,
      px: cx + ox + R * Math.cos(a),
      py: cy + oy + R * Math.sin(a) * 0.45,
      depth: Math.sin(a),
    });
  }
  bars.sort((a, b) => a.depth - b.depth);

  for (const { i, a, twist, px, py, depth } of bars) {
    const depthAlpha = 0.2 + 0.8 * ((depth + 1) / 2);

    // Chase: how far is this bar behind the head (0 = at head, 1 = opposite)
    const barPos  = i / N;
    let   delta   = chaseHead - barPos;
    // Wrap to 0..1 range behind the head
    if (delta < 0) delta += 1;
    // delta=0 means at head, delta=1 means just ahead (full wrap)
    // Brightness falls off from head backwards over trailF fraction
    const inTrail = delta < trailF;
    const brightness = inTrail ? (1 - delta / trailF) : 0;

    if (brightness < 0.02) continue; // skip invisible bars

    const bW = (2.5 + sizeF * 2) * brightness;
    const bH = (20  + sizeF * 22 * Math.abs(Math.cos(twist))) * (0.3 + brightness * 0.7);

    // Full colour wash — all bars same hue, just brightness varies
    const hue = state.colour;
    const lum = 35 + 35 * brightness;
    const sat = 80 + 15 * brightness;

    rctx.save();
    rctx.globalAlpha = depthAlpha * brightness;
    rctx.translate(px, py);
    rctx.rotate(a + twist);

    // Core bar
    const g = rctx.createLinearGradient(0, -bH/2, 0, bH/2);
    g.addColorStop(0,   `hsla(${hue},${sat}%,${lum+12}%,0)`);
    g.addColorStop(0.3, `hsla(${hue},${sat}%,${lum}%,1)`);
    g.addColorStop(0.7, `hsla(${hue},${sat}%,${lum}%,1)`);
    g.addColorStop(1,   `hsla(${hue},${sat}%,${lum+12}%,0)`);
    rctx.fillStyle = g;
    rctx.fillRect(-bW/2, -bH/2, bW, bH);

    // Bloom glow — brighter at head
    rctx.globalAlpha = depthAlpha * brightness * brightness * 0.25;
    rctx.fillStyle = `hsl(${hue},${sat}%,${lum}%)`;
    rctx.fillRect(-bW*5, -bH/2, bW*10, bH);

    rctx.restore();
  }

  // Touch bursts
  state.bursts = state.bursts.filter(b => b.life > 0);
  for (const b of state.bursts) {
    rctx.save();
    rctx.globalAlpha = b.life * 0.5;
    rctx.strokeStyle = `hsl(${b.hue},80%,55%)`;
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.arc(b.x, b.y, (1 - b.life) * 90, 0, Math.PI * 2);
    rctx.stroke();
    rctx.restore();
    b.life -= 0.035;
  }

  state.t += 0.016;
  requestAnimationFrame(drawRing);
}
drawRing();

/* ═══════════════════════
   KNOBS
═══════════════════════ */
const KNOB_CONFIGS = [
  { stateKey: 'colour', min: 0,   max: 360, init: 0   },
  { stateKey: 'chase',  min: 0,   max: 1,   init: 0.4 },
  { stateKey: 'speed',  min: 0,   max: 1,   init: 0.4 },
  { stateKey: 'size',   min: 0,   max: 1,   init: 0.5 },
];

const K_START = (210 * Math.PI) / 180;
const K_SWEEP = (300 * Math.PI) / 180;

function normToAngle(n) { return K_START + n * K_SWEEP; }

function drawKnob(kCanvas, normVal, isActive) {
  const kctx = kCanvas.getContext('2d');
  const sz   = kCanvas.width;
  const kx   = sz / 2, ky = sz / 2;
  const rOuter = sz * 0.36;
  const rInner = sz * 0.28;

  kctx.clearRect(0, 0, sz, sz);

  // Track bg
  kctx.beginPath();
  kctx.arc(kx, ky, rOuter, K_START, K_START + K_SWEEP);
  kctx.strokeStyle = '#1c1c1c';
  kctx.lineWidth = 2.5;
  kctx.lineCap = 'round';
  kctx.stroke();

  // Track fill
  if (normVal > 0.01) {
    const fillHue = state.colour;
    kctx.beginPath();
    kctx.arc(kx, ky, rOuter, K_START, normToAngle(normVal));
    kctx.strokeStyle = isActive
      ? `hsl(${fillHue}, 85%, 58%)`
      : `hsl(${fillHue}, 50%, 35%)`;
    kctx.lineWidth = 2.5;
    kctx.lineCap = 'round';
    kctx.stroke();
  }

  // Body
  kctx.beginPath();
  kctx.arc(kx, ky, rInner, 0, Math.PI * 2);
  kctx.fillStyle = '#0e0e0e';
  kctx.fill();
  kctx.strokeStyle = isActive ? `hsl(${state.colour}, 40%, 22%)` : '#1a1a1a';
  kctx.lineWidth = 1;
  kctx.stroke();

  // Indicator dot
  const angle = normToAngle(normVal);
  const dx = kx + rInner * 0.62 * Math.cos(angle);
  const dy = ky + rInner * 0.62 * Math.sin(angle);
  kctx.beginPath();
  kctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
  kctx.fillStyle = isActive ? `hsl(${state.colour}, 90%, 62%)` : '#555';
  kctx.fill();
}

const knobEls = [0,1,2,3].map(i => document.getElementById(`knob-${i}`));
const knobState = KNOB_CONFIGS.map(c => ({
  norm:   (c.init - c.min) / (c.max - c.min),
  active: false,
  lastY:  0,
}));

function applyKnob(i) {
  const cfg = KNOB_CONFIGS[i];
  state[cfg.stateKey] = cfg.min + knobState[i].norm * (cfg.max - cfg.min);
}

function redrawAllKnobs() {
  knobEls.forEach((el, i) => drawKnob(el, knobState[i].norm, knobState[i].active));
}

// Redraw knobs at 30fps so colour wash reflects on knob arcs
setInterval(redrawAllKnobs, 33);
redrawAllKnobs();

knobEls.forEach((el, i) => {
  // Touch
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    knobState[i].active = true;
    knobState[i].lastY  = e.touches[0].clientY;
    redrawAllKnobs();
  }, { passive: false });

  el.addEventListener('touchmove', e => {
    e.preventDefault();
    const dy = knobState[i].lastY - e.touches[0].clientY;
    knobState[i].lastY  = e.touches[0].clientY;
    knobState[i].norm   = Math.max(0, Math.min(1, knobState[i].norm + dy / 130));
    applyKnob(i);
    redrawAllKnobs();
  }, { passive: false });

  el.addEventListener('touchend',    e => { knobState[i].active = false; redrawAllKnobs(); }, { passive: false });
  el.addEventListener('touchcancel', e => { knobState[i].active = false; redrawAllKnobs(); }, { passive: false });

  // Mouse (desktop testing)
  let dragging = false;
  el.addEventListener('mousedown', e => {
    dragging = true;
    knobState[i].active = true;
    knobState[i].lastY  = e.clientY;
    redrawAllKnobs();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dy = knobState[i].lastY - e.clientY;
    knobState[i].lastY  = e.clientY;
    knobState[i].norm   = Math.max(0, Math.min(1, knobState[i].norm + dy / 130));
    applyKnob(i);
    redrawAllKnobs();
  });
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; knobState[i].active = false; redrawAllKnobs(); }
  });
});

/* ═══════════════════════
   GYROSCOPE
═══════════════════════ */
let gyroReq = false;
function startGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') window.addEventListener('deviceorientation', onOrientation); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }
}
function onOrientation(e) {
  state.tiltX = (e.gamma || 0) / 90;
  state.tiltY = Math.max(-1, Math.min(1, ((e.beta || 0) - 45) / 45));
}
document.addEventListener('touchstart', () => {
  if (!gyroReq) { gyroReq = true; startGyro(); }
}, { passive: true });

/* ═══════════════════════
   TAP RING
═══════════════════════ */
ringCanvas.addEventListener('touchstart', e => {
  const panelTop = document.getElementById('panel').getBoundingClientRect().top;
  for (const t of e.changedTouches) {
    if (t.clientY >= panelTop) return;
    state.bursts.push({ x: t.clientX, y: t.clientY, hue: state.colour, life: 1 });
    const el = document.createElement('div');
    el.className = 'burst';
    el.style.cssText = `left:${t.clientX}px;top:${t.clientY}px;border-color:hsl(${state.colour},80%,55%)`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}, { passive: true });

/* ═══════════════════════
   SHARE
═══════════════════════ */
document.getElementById('share-btn').addEventListener('click', () => {
  const p = new URLSearchParams({
    c: Math.round(state.colour),
    ch: state.chase.toFixed(2),
    s:  state.speed.toFixed(2),
    sz: state.size.toFixed(2),
  });
  const url = `${location.origin}${location.pathname}?${p}`;
  if (navigator.share) {
    navigator.share({ title: 'Möbius Light', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
});

// Load shared params from URL
(function() {
  const p = new URLSearchParams(location.search);
  const set = (idx, val, min, max) => {
    knobState[idx].norm = Math.max(0, Math.min(1, (val - min) / (max - min)));
    applyKnob(idx);
  };
  if (p.has('c'))  set(0, +p.get('c'),  0, 360);
  if (p.has('ch')) set(1, +p.get('ch'), 0, 1);
  if (p.has('s'))  set(2, +p.get('s'),  0, 1);
  if (p.has('sz')) set(3, +p.get('sz'), 0, 1);
  redrawAllKnobs();
})();
</script>
</body>
</html>
